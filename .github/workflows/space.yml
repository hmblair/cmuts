name: Sync HF Space

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Space repo
        run: |
          git clone https://hamishmilsonblair:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/hamishmilsonblair/cmuts space

      - name: Update pinned commit SHA
        run: |
          cd space
          sed -i "s/^ARG CMUTS_SHA=.*/ARG CMUTS_SHA=${GITHUB_SHA}/" Dockerfile
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Dockerfile
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Pin cmuts@${GITHUB_SHA::8}"
            git push
          fi
