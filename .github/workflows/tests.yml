name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Run the same pre-commit hooks (and pinned tool versions) used locally,
      # so formatting/linting can never drift between local commits and CI.
      - uses: pre-commit/action@v3.0.1

  test-python:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install Python package
        run: pip install -e ".[dev]"

      - name: Run quick tests
        run: pytest tests/python -v -m "not slow" --tb=short

  build-cpp:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libhdf5-dev \
            libhts-dev \
            zlib1g-dev \
            libomp-dev \
            pkg-config \
            autoconf \
            automake \
            libtool \
            libbz2-dev \
            liblzma-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install \
            hdf5 \
            htslib \
            zlib \
            cmake \
            autoconf \
            automake \
            libtool \
            libomp \
            pkg-config

      - name: Build htscodecs
        run: |
          cd htscodecs
          autoreconf -i
          mkdir -p build
          cd build
          ../configure --prefix="$(pwd)/.."
          make -j"$(getconf _NPROCESSORS_ONLN)"
          make install

      - name: Cache CMake build
        uses: actions/cache@v5
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          if [ "$RUNNER_OS" = "macOS" ]; then
            cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix)"
          else
            cmake .. -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build
        run: cmake --build build --parallel

  test-full:
    runs-on: ubuntu-latest
    needs: [lint, build-cpp]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libhdf5-dev \
            libhts-dev \
            samtools \
            zlib1g-dev \
            libomp-dev \
            pkg-config \
            autoconf \
            automake \
            libtool \
            libbz2-dev \
            liblzma-dev

      - name: Build and install
        run: ./configure

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Add bin to PATH
        run: echo "${{ github.workspace }}/bin" >> $GITHUB_PATH

      - name: Run full test suite
        run: pytest tests/python -v -rs --tb=short

      - name: Run tests with coverage
        run: pytest tests/python -v --cov=src/python/cmuts --cov-report=xml --cov-fail-under=0

  deploy-docs:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install mkdocs and dependencies
        run: pip install mkdocs mkdocs-material mkdocs-glightbox pymdown-extensions

      - name: Deploy docs to GitHub Pages
        run: mkdocs gh-deploy --force
